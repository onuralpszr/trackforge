printWidth: 100
tabWidth: 2
useTabs: false
semi: true
singleQuote: false
trailingComma: all
bracketSpacing: true
proseWrap: preserve
endOfLine: lf

overrides:
  - files: "*.md"
    options:
      proseWrap: preserve
      printWidth: 120
  - files: ["*.yaml", "*.yml"]
    options:
      singleQuote: false
