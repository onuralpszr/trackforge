# Pre-commit / prek configuration
# Runs with either `pre-commit run --all-files` or `prek run --all-files`
# prek (https://github.com/j178/prek) is a drop-in Rust reimplementation
# of pre-commit and understands this file unchanged.

default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]

repos:
  # --- Generic hygiene --------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(CHANGELOG\.md|Cargo\.lock)$
      - id: end-of-file-fixer
        exclude: ^(CHANGELOG\.md|Cargo\.lock)$
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # --- Spell check ------------------------------------------------------
  - repo: https://github.com/crate-ci/typos
    rev: v1.28.4
    hooks:
      - id: typos

  # --- Rust -------------------------------------------------------------
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        args: [--all, --]
      - id: clippy
        args: [--all-targets, --all-features, --, -D, warnings]

  # --- TOML formatter ---------------------------------------------------
  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format
      - id: taplo-lint

  # --- Markdown / Prose -------------------------------------------------
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.4.2
    hooks:
      - id: prettier
        types_or: [markdown, yaml, json]
        exclude: ^(CHANGELOG\.md|target/|site/|docs/api/)

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.18.1
    hooks:
      - id: markdownlint-cli2
        args: [--fix]
        exclude: ^(CHANGELOG\.md|target/|site/|docs/api/)

  # --- Python (pyo3 bindings / scripts) --------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # --- Commit message ---------------------------------------------------
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.1.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
