name: Build and Deploy Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-docs-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.11"
          activate-environment: "true"

      - name: Install dependencies
        run: |
          uv pip install zensical "mkdocstrings[python]" maturin
          cargo install cargo-docs-md

      - name: Build Python package
        run: maturin develop

      - name: Generate Rustdoc JSON
        run: cargo +nightly doc --no-deps
        env:
          RUSTDOCFLAGS: "-Z unstable-options --output-format json"

      - name: Convert Rustdoc to Markdown
        run: |
          mkdir -p docs/api
          cargo docs-md -p target/doc/trackforge.json -o docs/api --full-method-docs
          python3 scripts/fix_docs.py

      - name: Build Zensical site
        run: zensical build --clean

      - name: Install mdbook
        uses: taiki-e/install-action@8b3c737da4b541bf0fb5a3e0488ff20535badac9 # v2.82.1
        with:
          tool: mdbook

      - name: Build the book under /book
        run: |
          mdbook build book
          mkdir -p site/book
          cp -r book/book/. site/book/

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
