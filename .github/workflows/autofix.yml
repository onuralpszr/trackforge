name: autofix.ci

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install tools
        uses: taiki-e/install-action@56545b37b57562edd73171cb6c62cc509db4c34e # v2.81.7
        with:
          tool: prek,typos-cli,taplo-cli

      - name: Run prek fixers
        run: prek run --all-files --color always || true

      - name: Cargo fmt
        run: cargo fmt --all

      - name: Cargo clippy --fix
        run: |
          cargo clippy --all-targets --all-features --fix --allow-dirty --allow-staged -- -D warnings || true

      - name: Taplo format
        run: taplo fmt

      - name: Typos (auto-correct)
        run: typos --write-changes || true

      - uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a # v1.3.4
        with:
          fail-fast: false
