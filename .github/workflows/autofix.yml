name: autofix.ci

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install tools
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: prek,typos-cli,taplo-cli

      - name: Run prek fixers
        run: prek run --all-files --color always || true

      - name: Cargo fmt
        run: cargo fmt --all

      - name: Cargo clippy --fix
        run: |
          cargo clippy --all-targets --all-features --fix --allow-dirty --allow-staged -- -D warnings || true

      - name: Taplo format
        run: taplo fmt

      - name: Typos (auto-correct)
        run: typos --write-changes || true

      - uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a # v1.3.4
        with:
          fail-fast: false
