name: Pre-commit (prek)

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prek:
    name: prek run --all-files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2.9.1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node (for prettier / markdownlint-cli2)
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install prek
        uses: taiki-e/install-action@v2.75.7
        with:
          tool: prek

      - name: Cache prek envs
        uses: actions/cache@v4
        with:
          path: ~/.cache/prek
          key: prek-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            prek-${{ runner.os }}-

      - name: Run prek on all files
        run: prek run --all-files --show-diff-on-failure --color always
