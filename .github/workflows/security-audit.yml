name: Security audit

on:
  push:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
  schedule:
    # Weekly re-scan against latest advisory DB.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  # rustsec/audit-check posts results as a check run and opens issues.
  checks: write
  issues: write

jobs:
  security_audit:
    runs-on: ubuntu-latest
    # Skip the check-run posting path on fork PRs — GITHUB_TOKEN is read-only there.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ignore: RUSTSEC-2024-0436

  # Fallback job for fork PRs: runs cargo-audit directly without needing
  # write permissions on the repo (fails the job if advisories are found).
  security_audit_fork:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@8b3c737da4b541bf0fb5a3e0488ff20535badac9 # v2.82.1
        with:
          tool: cargo-audit
      - run: cargo audit --ignore RUSTSEC-2024-0436
