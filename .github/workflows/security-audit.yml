name: Security audit

on:
  push:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
  schedule:
    # Weekly re-scan against latest advisory DB.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  # rustsec/audit-check posts results as a check run and opens issues.
  checks: write
  issues: write

jobs:
  security_audit:
    runs-on: ubuntu-latest
    # Skip the check-run posting path on fork PRs — GITHUB_TOKEN is read-only there.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ignore: RUSTSEC-2024-0436

  # Fallback job for fork PRs: runs cargo-audit directly without needing
  # write permissions on the repo (fails the job if advisories are found).
  security_audit_fork:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@3771e22aa892e03fd35585fae288baad1755695c # v2.78.2
        with:
          tool: cargo-audit
      - run: cargo audit --ignore RUSTSEC-2024-0436
